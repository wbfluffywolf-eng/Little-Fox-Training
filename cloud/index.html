<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Little Fox Training Cloud</title>
  <meta name="theme-color" content="#26313a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Little Fox">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="avatar-fix.css">
  <link rel="stylesheet" href="calendar-profile.css">
  <link rel="stylesheet" href="messages-ui.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="../assets/sidebar-wag-wag.png">
</head>
<body>
  <main id="app" class="app-shell">
    <section class="auth-card">
      <h1>Little Fox Training Cloud</h1>
      <p>Loading secure cloud app...</p>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script type="module" src="tracker-default.js"></script>
  <script type="module" src="log-fix.js"></script>
  <script type="module" src="log-event-null-fix.js"></script>
  <script type="module" src="friend-link-fix.js"></script>
  <script type="module" src="auth-redirect-fix.js"></script>
  <script type="module" src="member-actions-fix.js"></script>
  <script type="module" src="member-access-editor.js"></script>
  <script type="module" src="cloud-full.js"></script>
  <script type="module" src="event-multi-fix.js"></script>
  <script type="module" src="log-option-fix.js"></script>
  <script type="module" src="calendar-tracking.js"></script>
  <script type="module" src="inventory-rebuild.js"></script>
  <script type="module" src="suggestion-fix.js"></script>
  <script type="module" src="messages.js"></script>
  <script type="module" src="friends-tab.js"></script>
  <script type="module" src="friend-search.js"></script>
  <script type="module" src="friend-request-send-fix.js"></script>
  <script type="module" src="friend-request-accept-fix.js"></script>
  <script type="module" src="public.js"></script>
  <script type="module" src="account-rebuild-fix.js"></script>
  <script type="module" src="app-version.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
  <script>
    (() => {
      const key = "littleFoxCloudGraphPrefs";
      const graphTitles = [
        "Sleep and Day Summary",
        "Event Type",
        "Diaper Usage",
        "Expense Split",
        "Cloth Cost Per Wear",
        "Subcategories",
        "By Category"
      ];
      const defaults = Object.fromEntries(graphTitles.map(title => [title, true]));

      function loadPrefs() {
        try {
          return { ...defaults, ...JSON.parse(localStorage.getItem(key) || "{}") };
        } catch {
          return { ...defaults };
        }
      }

      function savePrefs(prefs) {
        localStorage.setItem(key, JSON.stringify(prefs));
      }

      function applyGraphPrefs() {
        const prefs = loadPrefs();
        document.querySelectorAll(".card h3").forEach(heading => {
          const title = heading.textContent.trim();
          if (!graphTitles.includes(title)) return;
          heading.closest(".card").style.display = prefs[title] ? "" : "none";
        });
      }

      function injectSettings() {
        const pageTitle = document.querySelector(".topbar h2")?.textContent.trim();
        const view = document.getElementById("view");
        if (pageTitle !== "Settings" || !view || document.getElementById("graphSettingsForm")) return;
        const prefs = loadPrefs();
        const card = document.createElement("article");
        card.className = "card graph-settings";
        card.innerHTML = `
          <h3>Visible Graphs</h3>
          <p>Turn off graph sections you do not want to see.</p>
          <form id="graphSettingsForm" class="form-grid" style="margin-top:12px">
            ${graphTitles.map(title => `
              <label>
                <input type="checkbox" name="${title}" ${prefs[title] ? "checked" : ""}>
                <span>${title}</span>
              </label>
            `).join("")}
          </form>
        `;
        view.appendChild(card);
        card.querySelectorAll("input").forEach(input => {
          input.addEventListener("change", () => {
            const next = loadPrefs();
            next[input.name] = input.checked;
            savePrefs(next);
            applyGraphPrefs();
          });
        });
      }

      document.addEventListener("click", event => {
        if (event.target.closest('[data-tab="settings"]')) {
          setTimeout(() => {
            injectSettings();
            applyGraphPrefs();
          }, 100);
          return;
        }
        if (event.target.closest("[data-tab]")) setTimeout(applyGraphPrefs, 100);
      });
      document.addEventListener("DOMContentLoaded", () => {
        injectSettings();
        applyGraphPrefs();
      });
      [500, 1500, 3000].forEach(delay => setTimeout(() => {
        injectSettings();
        applyGraphPrefs();
      }, delay));
    })();
  </script>
</body>
</html>
